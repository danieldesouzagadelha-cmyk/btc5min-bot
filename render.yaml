services:
  - type: cron
    name: btc-5min-bot
    runtime: python
    schedule: "*/5 * * * *"  # A cada 5 minutos
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SIMULATION_MODE
        value: true
