name: BTC 5min Bot - Monitoramento 24/7

on:
  schedule:
    # Executa a cada hora, no minuto 0
    - cron: "0 * * * *"
  workflow_dispatch:  # Permite execução manual

jobs:
  monitorar:
    name: 🤖 Executar Bot por 55 minutos
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Baixar código
        uses: actions/checkout@v4
      
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Instalar dependências
        run: |
          pip install -r requirements.txt
          echo "✅ Dependências instaladas"
      
      - name: 🤖 Executar Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SIMULATION_MODE: true
        run: |
          echo "🚀 Iniciando bot em $(date)"
          echo "📊 Monitorando BTC 5min por 55 minutos..."
          python bot.py
          echo "✅ Bot finalizado em $(date)"
      
      - name: 📤 Salvar logs
        uses: actions/upload-artifact@v4
        with:
          name: logs-bot-${{ github.run_id }}
          path: |
            monitor_*.csv
            resumo_*.txt
          retention-days: 7
          if-no-files-found: warn
      
      - name: 📊 Mostrar resultado
        run: |
          echo "✅ Execução concluída!"
          echo "📁 Logs salvos como artefato"
          echo "🔍 Verifique o Telegram para notificações"
