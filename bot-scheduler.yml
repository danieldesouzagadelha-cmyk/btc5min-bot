name: BTC 5min Bot Scheduler

on:
  schedule:
    # Executa a cada hora (ajuste conforme necessário)
    - cron: "0 * * * *"  # A cada hora cheia
  workflow_dispatch:  # Permite execução manual

jobs:
  run-bot:
    name: Executar Bot de Monitoramento
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Instalar dependências
        run: |
          pip install -r requirements.txt
      
      - name: 🤖 Executar bot (55 minutos)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SIMULATION_MODE: true
        run: |
          echo "🚀 Iniciando bot em $(date)"
          python bot.py
          echo "✅ Bot finalizado em $(date)"
      
      - name: 📤 Upload de logs (opcional)
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs
          path: monitor_*.csv
          retention-days: 7